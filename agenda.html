<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda COE — Embraps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.5">
    <link rel="stylesheet" href="css/agenda.css?v=1.5">
    <style>
        /* Ajustes finos para garantir que os botões apareçam */
        .btn-action { cursor: pointer; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; transition: all 0.2s; }
        .btn-action:hover { background: #f1f5f9; transform: translateY(-1px); }
        .btn-action.success:hover { color: #16a34a; border-color: #16a34a; }
        .btn-action.danger:hover { color: #dc2626; border-color: #dc2626; }
        .btn-action.primary:hover { color: #2563eb; border-color: #2563eb; }
        
        .agenda-tab-content { display: none; }
        .agenda-tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="agenda-body">

<!-- LOGIN SCREEN -->
<div id="agenda-login-screen" class="agenda-login-screen">
    <div class="agenda-login-card">
        <div class="agenda-login-logo">
            <img src="assets/img/Logo.png" alt="Embraps" onerror="this.style.display='none'">
            <h1>Agenda <span>COE</span></h1>
            <p>Controle de Atividades Operacionais</p>
        </div>

        <div class="agenda-login-tabs">
            <button class="agenda-tab-btn active" id="btn-tab-admin" onclick="setLoginType('admin')">Admin</button>
            <button class="agenda-tab-btn" id="btn-tab-operador" onclick="setLoginType('operador')">Operador</button>
        </div>

        <div id="form-admin" class="agenda-login-form">
            <div class="agenda-form-group">
                <label>Senha de Acesso</label>
                <input type="password" id="login-admin-pass" placeholder="Senha do painel...">
            </div>
            <button class="agenda-btn-primary" onclick="handleLogin('admin')">Entrar como Gestor</button>
        </div>

        <div id="form-operador" class="agenda-login-form" style="display:none">
            <div class="agenda-form-group">
                <label>Selecionar Nome</label>
                <select id="login-operador-id">
                    <option value="">— Selecione —</option>
                    <option value="iris">Iris Souza (Limpeza)</option>
                    <option value="hallan">Hallan de Barros (Diurno)</option>
                    <option value="victor">Victor Dourado (Noturno)</option>
                    <option value="walmir">Walmir da Luz (Folguista)</option>
                    <option value="rodrigo">Rodrigo Vilanova (Back-Office)</option>
                    <option value="nikolas">Nikolas Cardoso (ADMDOP)</option>
                </select>
            </div>
            <div class="agenda-form-group">
                <label>Sua Senha</label>
                <input type="password" id="login-operador-pass" placeholder="Sua senha individual...">
            </div>
            <button class="agenda-btn-primary" onclick="handleLogin('operador')">Acessar Minha Agenda</button>
        </div>

        <p id="login-error" style="color: #dc2626; font-size: 0.85rem; margin-top: 1rem; display:none;">Usuário ou senha incorretos.</p>
        
        <a href="index.html" class="agenda-back-link"><i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard</a>
    </div>
</div>

<!-- MAIN APP -->
<div id="agenda-app" style="display:none">
    <header class="agenda-header">
        <div class="agenda-header-left">
            <a href="index.html" class="agenda-header-logo">
                <img src="assets/img/Logo.png" alt="Embraps" style="height:32px">
                <span class="agenda-header-title">Agenda <strong>COE</strong></span>
            </a>
        </div>
        <div class="agenda-header-right">
            <span id="user-display" class="agenda-user-badge"></span>
            <button class="agenda-btn-ghost" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
        </div>
    </header>

    <div class="agenda-container">
        
        <!-- ADMIN VIEW -->
        <div id="view-admin" style="display:none">
            <div class="agenda-admin-tabs">
                <button class="agenda-admin-tab active" data-tab="tarefas">Tarefas</button>
                <button class="agenda-admin-tab" data-tab="ranking">Ranking & SLA</button>
                <button class="agenda-admin-tab" data-tab="historico">Histórico</button>
            </div>

            <!-- TAB TAREFAS -->
            <div id="tab-tarefas" class="agenda-tab-content active">
                <div id="admin-kpis" class="agenda-kpi-grid"></div>
                
                <div class="agenda-actions-bar">
                    <button class="agenda-btn-primary" onclick="openTaskModal()"><i class="fa-solid fa-plus"></i> Nova Atividade</button>
                    <div class="agenda-filters">
                        <select id="filter-op" onchange="renderAdminTasks()"><option value="">Todos Operadores</option></select>
                        <select id="filter-status" onchange="renderAdminTasks()">
                            <option value="">Todos Status</option>
                            <option value="pendente">Pendente</option>
                            <option value="atrasada">Atrasada</option>
                            <option value="concluida">Concluída</option>
                        </select>
                    </div>
                </div>

                <div class="agenda-table-wrapper">
                    <table class="agenda-table">
                        <thead>
                            <tr>
                                <th>Atividade / Prazo</th>
                                <th>Responsável</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="table-tasks-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- TAB RANKING -->
            <div id="tab-ranking" class="agenda-tab-content">
                <div id="ranking-list" class="card" style="padding: 2rem;"></div>
            </div>

            <!-- TAB HISTORICO -->
            <div id="tab-historico" class="agenda-tab-content">
                <div class="agenda-table-wrapper">
                    <table class="agenda-table">
                        <thead>
                            <tr>
                                <th>Atividade</th>
                                <th>Concluída Por</th>
                                <th>Data/Hora</th>
                                <th>Observação</th>
                            </tr>
                        </thead>
                        <tbody id="table-history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- OPERATOR VIEW -->
        <div id="view-operador" style="display:none">
            <div id="operador-kpis" class="agenda-kpi-grid"></div>
            <h3 style="margin-bottom: 1.5rem;">Minhas Atividades de Hoje</h3>
            <div id="operador-tasks-list"></div>
        </div>

    </div>
</div>

<!-- MODAL: TASK (CREATE/EDIT) -->
<div id="modal-task" class="agenda-modal-overlay" style="display:none">
    <div class="agenda-modal-card">
        <div class="agenda-modal-header">
            <h2 id="modal-task-title">Nova Atividade</h2>
            <button class="agenda-modal-close" onclick="closeTaskModal()">&times;</button>
        </div>
        <div class="agenda-modal-body">
            <input type="hidden" id="task-id">
            <div class="agenda-form-group">
                <label>Título da Atividade</label>
                <input type="text" id="task-name" placeholder="Ex: Conferência de posto">
            </div>
            <div class="agenda-form-row">
                <div class="agenda-form-group">
                    <label>Responsável</label>
                    <select id="task-op-id">
                        <option value="iris">Iris Souza</option>
                        <option value="hallan">Hallan de Barros</option>
                        <option value="victor">Victor Dourado</option>
                        <option value="walmir">Walmir da Luz</option>
                        <option value="rodrigo">Rodrigo Vilanova</option>
                        <option value="nikolas">Nikolas Cardoso</option>
                    </select>
                </div>
                <div class="agenda-form-group">
                    <label>Frequência</label>
                    <select id="task-freq">
                        <option value="diaria">Diária</option>
                        <option value="semanal">Semanal</option>
                        <option value="mensal">Mensal</option>
                    </select>
                </div>
            </div>
            <div class="agenda-form-row">
                <div class="agenda-form-group">
                    <label>Data/Hora Limite</label>
                    <input type="datetime-local" id="task-deadline">
                </div>
                <div class="agenda-form-group">
                    <label>Prioridade</label>
                    <select id="task-priority">
                        <option value="baixa">Baixa</option>
                        <option value="media" selected>Média</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
            </div>
            <div class="agenda-form-group">
                <label>Descrição (Opcional)</label>
                <textarea id="task-desc" rows="2"></textarea>
            </div>
        </div>
        <div class="agenda-modal-footer">
            <button class="agenda-btn-ghost" onclick="closeTaskModal()">Cancelar</button>
            <button class="agenda-btn-primary" onclick="saveTask()">Salvar Atividade</button>
        </div>
    </div>
</div>

<!-- MODAL: CONCLUDE -->
<div id="modal-conclude" class="agenda-modal-overlay" style="display:none">
    <div class="agenda-modal-card">
        <div class="agenda-modal-header">
            <h2>Concluir Atividade</h2>
            <button class="agenda-modal-close" onclick="closeConcludeModal()">&times;</button>
        </div>
        <div class="agenda-modal-body">
            <input type="hidden" id="conclude-task-id">
            <p id="conclude-task-name" style="font-weight: 600; margin-bottom: 1rem;"></p>
            <div class="agenda-form-group">
                <label>Observação / Justificativa</label>
                <textarea id="conclude-obs" rows="3" placeholder="Opcional..."></textarea>
            </div>
        </div>
        <div class="agenda-modal-footer">
            <button class="agenda-btn-ghost" onclick="closeConcludeModal()">Cancelar</button>
            <button class="agenda-btn-primary" onclick="confirmConclusion()" style="background: #16a34a;">Confirmar Conclusão</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=1.5"></script>
<script src="js/agenda.js?v=1.5"></script>

</body>
</html>

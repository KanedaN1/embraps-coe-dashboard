<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda COE — Embraps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.3">
    <link rel="stylesheet" href="css/agenda.css?v=1.3">
</head>
<body class="agenda-body">

<!-- =========================================================
     TELA DE LOGIN
     ========================================================= -->
<div id="agenda-login-screen" class="agenda-login-screen">
    <div class="agenda-login-card">
        <div class="agenda-login-logo">
            <img src="assets/img/Logo.png" alt="Embraps" onerror="this.style.display='none'">
            <h1>Agenda <span>COE</span></h1>
            <p>Centro de Operações Embraps</p>
        </div>

        <div class="agenda-login-tabs">
            <button class="agenda-tab-btn active" id="tab-admin" onclick="agendaSelectLoginType('admin')">
                <i class="fa-solid fa-shield-halved"></i> Admin
            </button>
            <button class="agenda-tab-btn" id="tab-operador" onclick="agendaSelectLoginType('operador')">
                <i class="fa-solid fa-user-tie"></i> Operador
            </button>
        </div>

        <!-- Admin Login -->
        <div id="login-form-admin" class="agenda-login-form">
            <div class="agenda-form-group">
                <label><i class="fa-solid fa-lock"></i> Senha Admin</label>
                <input type="password" id="admin-senha" placeholder="Digite a senha..." autocomplete="current-password">
            </div>
            <button class="agenda-btn-primary" onclick="agendaLoginAdmin()">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar como Admin
            </button>
        </div>

        <!-- Operador Login -->
        <div id="login-form-operador" class="agenda-login-form" style="display:none">
            <div class="agenda-form-group">
                <label><i class="fa-solid fa-user"></i> Selecionar Operador</label>
                <select id="operador-select">
                    <option value="">— Selecione —</option>
                    <option value="iris">Iris Souza (Limpeza)</option>
                    <option value="hallan">Hallan de Barros (Diurno)</option>
                    <option value="victor">Victor Dourado (Noturno)</option>
                    <option value="walmir">Walmir da Luz (Folguista)</option>
                    <option value="rodrigo">Rodrigo Vilanova (Back-Office)</option>
                    <option value="nikolas">Nikolas Cardoso (ADMDOP)</option>
                </select>
            </div>
            <div class="agenda-form-group">
                <label><i class="fa-solid fa-key"></i> Senha</label>
                <input type="password" id="operador-senha" placeholder="Digite sua senha...">
            </div>
            <button class="agenda-btn-primary" onclick="agendaLoginOperador()">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar
            </button>
        </div>

        <p id="agenda-login-error" class="agenda-login-error" style="display:none">
            <i class="fa-solid fa-circle-exclamation"></i> Usuário ou senha incorretos.
        </p>

        <a href="index.html" class="agenda-back-link">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard
        </a>
    </div>
</div>

<!-- =========================================================
     PAINEL PRINCIPAL (Admin + Operador)
     ========================================================= -->
<div id="agenda-app" style="display:none">

    <!-- Top Bar -->
    <header class="agenda-header">
        <div class="agenda-header-left">
            <a href="index.html" class="agenda-header-logo">
                <img src="assets/img/Logo.png" alt="Embraps" onerror="this.style.display='none'" style="height:32px">
                <span class="agenda-header-title">Agenda <strong>COE</strong></span>
            </a>
        </div>
        <div class="agenda-header-right">
            <span id="agenda-user-badge" class="agenda-user-badge"></span>
            <span id="agenda-date-now" class="agenda-date-now"></span>
            <button class="agenda-btn-ghost" onclick="agendaLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </div>
    </header>

    <!-- ---- PAINEL ADMIN ---- -->
    <div id="painel-admin" style="display:none">
        <div class="agenda-container">

            <!-- Tabs Admin -->
            <div class="agenda-admin-tabs">
                <button class="agenda-admin-tab active" onclick="showAdminTab('tarefas')">
                    <i class="fa-solid fa-list-check"></i> Tarefas
                </button>
                <button class="agenda-admin-tab" onclick="showAdminTab('ranking')">
                    <i class="fa-solid fa-trophy"></i> Ranking &amp; SLA
                </button>
                <button class="agenda-admin-tab" onclick="showAdminTab('historico')">
                    <i class="fa-solid fa-clock-rotate-left"></i> Histórico
                </button>
            </div>

            <!-- TAB: Tarefas -->
            <div id="admin-tab-tarefas" class="admin-tab-content active-tab">
                <!-- KPI Cards -->
                <div class="agenda-kpi-grid" id="agenda-kpis"></div>

                <!-- Ações + Filtros -->
                <div class="agenda-actions-bar">
                    <button class="agenda-btn-primary" onclick="abrirModalNovaTarefa()">
                        <i class="fa-solid fa-plus"></i> Nova Tarefa
                    </button>
                    <button class="agenda-btn-outline" onclick="agendaExportPDF()">
                        <i class="fa-solid fa-file-pdf"></i> Exportar PDF
                    </button>
                    <div class="agenda-filters">
                        <select id="filtro-operador" onchange="renderTabelaAdmin()">
                            <option value="">Todos os Operadores</option>
                            <option value="iris">Iris Souza</option>
                            <option value="hallan">Hallan de Barros</option>
                            <option value="victor">Victor Dourado</option>
                            <option value="walmir">Walmir da Luz</option>
                            <option value="rodrigo">Rodrigo Vilanova</option>
                            <option value="nikolas">Nikolas Cardoso</option>
                        </select>
                        <select id="filtro-status" onchange="renderTabelaAdmin()">
                            <option value="">Todos os Status</option>
                            <option value="pendente">Pendente</option>
                            <option value="em_andamento">Em Andamento</option>
                            <option value="concluida">Concluída</option>
                            <option value="atrasada">Atrasada</option>
                            <option value="justificada">Justificada</option>
                        </select>
                        <select id="filtro-frequencia" onchange="renderTabelaAdmin()">
                            <option value="">Todas as Frequências</option>
                            <option value="diaria">Diária</option>
                            <option value="semanal">Semanal</option>
                            <option value="mensal">Mensal</option>
                        </select>
                    </div>
                </div>

                <!-- Tabela -->
                <div class="agenda-table-wrapper" id="admin-tabela-container">
                    <p class="agenda-empty">Nenhuma tarefa encontrada.</p>
                </div>
            </div>

            <!-- TAB: Ranking -->
            <div id="admin-tab-ranking" class="admin-tab-content">
                <div id="ranking-container"></div>
            </div>

            <!-- TAB: Histórico -->
            <div id="admin-tab-historico" class="admin-tab-content">
                <div id="historico-container"></div>
            </div>
        </div>
    </div>

    <!-- ---- PAINEL OPERADOR ---- -->
    <div id="painel-operador" style="display:none">
        <div class="agenda-container">
            <div id="operador-kpis" class="agenda-kpi-grid"></div>
            <div id="operador-tarefas-container"></div>
        </div>
    </div>
</div>

<!-- =========================================================
     MODAL: Nova/Editar Tarefa
     ========================================================= -->
<div id="modal-tarefa" class="agenda-modal-overlay" style="display:none" onclick="fecharModalTarefa(event)">
    <div class="agenda-modal-card" onclick="event.stopPropagation()">
        <div class="agenda-modal-header">
            <h2 id="modal-tarefa-title"><i class="fa-solid fa-plus"></i> Nova Tarefa</h2>
            <button class="agenda-modal-close" onclick="fecharModalTarefa()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="agenda-modal-body">
            <input type="hidden" id="modal-tarefa-id">
            <div class="agenda-form-row">
                <div class="agenda-form-group">
                    <label>Nome da Atividade *</label>
                    <input type="text" id="modal-nome" placeholder="Ex: Atualização do mapa de ronda">
                </div>
                <div class="agenda-form-group">
                    <label>Responsável *</label>
                    <select id="modal-operador">
                        <option value="">— Selecione —</option>
                        <option value="iris">Iris Souza (Limpeza)</option>
                        <option value="hallan">Hallan de Barros (Diurno)</option>
                        <option value="victor">Victor Dourado (Noturno)</option>
                        <option value="walmir">Walmir da Luz (Folguista)</option>
                        <option value="rodrigo">Rodrigo Vilanova (Back-Office)</option>
                        <option value="nikolas">Nikolas Cardoso (ADMDOP)</option>
                    </select>
                </div>
            </div>
            <div class="agenda-form-group">
                <label>Descrição</label>
                <textarea id="modal-descricao" rows="3" placeholder="Descreva o que deve ser feito..."></textarea>
            </div>
            <div class="agenda-form-row">
                <div class="agenda-form-group">
                    <label>Frequência *</label>
                    <select id="modal-frequencia">
                        <option value="diaria">Diária</option>
                        <option value="semanal">Semanal</option>
                        <option value="mensal">Mensal</option>
                    </select>
                </div>
                <div class="agenda-form-group">
                    <label>Data/Hora Limite *</label>
                    <input type="datetime-local" id="modal-prazo">
                </div>
                <div class="agenda-form-group">
                    <label>Prioridade</label>
                    <select id="modal-prioridade">
                        <option value="alta">🔴 Alta</option>
                        <option value="media" selected>🟡 Média</option>
                        <option value="baixa">🟢 Baixa</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="agenda-modal-footer">
            <button class="agenda-btn-ghost" onclick="fecharModalTarefa()">Cancelar</button>
            <button class="agenda-btn-primary" onclick="salvarTarefa()">
                <i class="fa-solid fa-floppy-disk"></i> Salvar
            </button>
        </div>
    </div>
</div>

<!-- MODAL: Concluir / Justificar -->
<div id="modal-conclusao" class="agenda-modal-overlay" style="display:none" onclick="fecharModalConclusao(event)">
    <div class="agenda-modal-card" onclick="event.stopPropagation()">
        <div class="agenda-modal-header">
            <h2 id="modal-conclusao-title"><i class="fa-solid fa-check-circle"></i> Concluir Atividade</h2>
            <button class="agenda-modal-close" onclick="fecharModalConclusao()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="agenda-modal-body">
            <input type="hidden" id="conclusao-tarefa-id">
            <div class="agenda-form-group">
                <label>Observação / Justificativa</label>
                <textarea id="conclusao-obs" rows="4" placeholder="Adicione uma observação..."></textarea>
            </div>
        </div>
        <div class="agenda-modal-footer">
            <button class="agenda-btn-ghost" onclick="fecharModalConclusao()">Cancelar</button>
            <button class="agenda-btn-success" onclick="confirmarConclusao()">
                <i class="fa-solid fa-check"></i> Confirmar Conclusão
            </button>
        </div>
    </div>
</div>

<!-- MODAL: Histórico da Tarefa -->
<div id="modal-historico" class="agenda-modal-overlay" style="display:none" onclick="fecharModalHistorico(event)">
    <div class="agenda-modal-card" onclick="event.stopPropagation()" style="max-width:600px">
        <div class="agenda-modal-header">
            <h2><i class="fa-solid fa-timeline"></i> Histórico da Atividade</h2>
            <button class="agenda-modal-close" onclick="fecharModalHistorico()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="agenda-modal-body">
            <div id="historico-timeline"></div>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div id="agenda-toast" class="agenda-toast" style="display:none"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=1.3"></script>
<script src="js/agenda.js?v=1.3"></script>
</body>
</html>

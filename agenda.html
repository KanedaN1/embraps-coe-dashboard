<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda COE — Embraps</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css?v=2.0">
  <link rel="stylesheet" href="css/agenda.css?v=2.0">
</head>
<body class="agenda-body">

<!-- ============================================================
     TELA DE LOGIN
     ============================================================ -->
<div id="ag-login">
  <div class="ag-login-wrap">
    <div class="ag-login-box">

      <div class="ag-login-logo">
        <img src="assets/img/Logo.png" alt="Embraps" onerror="this.style.display='none'">
        <h1>Agenda <span>COE</span></h1>
        <p>Sistema de Controle Operacional</p>
      </div>

      <div class="ag-type-tabs">
        <button class="ag-type-tab active" onclick="ag_setType('admin')">
          <i class="fa-solid fa-shield-halved"></i> Gestor
        </button>
        <button class="ag-type-tab" onclick="ag_setType('operador')">
          <i class="fa-solid fa-user-tie"></i> Operador
        </button>
      </div>

      <!-- Formulário Admin -->
      <div id="ag-form-admin">
        <div class="ag-form-group">
          <label>Senha de Acesso</label>
          <input type="password" id="ag-admin-pw" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter') ag_login('admin')">
        </div>
        <button class="ag-btn ag-btn-primary ag-btn-full" onclick="ag_login('admin')">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar como Gestor
        </button>
      </div>

      <!-- Formulário Operador -->
      <div id="ag-form-operador" style="display:none">
        <div class="ag-form-group">
          <label>Selecionar Operador</label>
          <select id="ag-op-select">
            <option value="">— Selecione —</option>
            <option value="iris">Iris Souza (Limpeza)</option>
            <option value="hallan">Hallan de Barros (Diurno)</option>
            <option value="victor">Victor Dourado (Noturno)</option>
            <option value="walmir">Walmir da Luz (Folguista)</option>
            <option value="rodrigo">Rodrigo Vilanova (Back-Office)</option>
            <option value="nikolas">Nikolas Cardoso (ADMDOP)</option>
          </select>
        </div>
        <div class="ag-form-group">
          <label>Senha</label>
          <input type="password" id="ag-op-pw" placeholder="Sua senha..." onkeydown="if(event.key==='Enter') ag_login('operador')">
        </div>
        <button class="ag-btn ag-btn-primary ag-btn-full" onclick="ag_login('operador')">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Acessar Minha Agenda
        </button>
      </div>

      <p id="ag-login-err" class="ag-error" style="display:none">
        <i class="fa-solid fa-triangle-exclamation"></i> Usuário ou senha incorretos.
      </p>
      <a href="index.html" class="ag-back-link">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard
      </a>
    </div>
  </div>
</div>

<!-- ============================================================
     APLICATIVO PRINCIPAL
     ============================================================ -->
<div id="ag-app" style="display:none">

  <!-- Header -->
  <header class="ag-header">
    <a href="index.html" class="ag-header-logo">
      <img src="assets/img/Logo.png" alt="Embraps" onerror="this.style.display='none'">
      <span>Agenda <strong>COE</strong></span>
    </a>
    <div class="ag-header-right">
      <div class="ag-header-filters">
        <select id="ag-filter-year" onchange="ag_loadTasks()">
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026" selected>2026</option>
        </select>
        <select id="ag-filter-month" onchange="ag_loadTasks()">
          <option value="01">Jan</option>
          <option value="02">Fev</option>
          <option value="03">Mar</option>
          <option value="04">Abr</option>
          <option value="05">Mai</option>
          <option value="06">Jun</option>
          <option value="07">Jul</option>
          <option value="08">Ago</option>
          <option value="09">Set</option>
          <option value="10">Out</option>
          <option value="11">Nov</option>
          <option value="12">Dez</option>
        </select>
      </div>
      <span id="ag-user-name" class="ag-user-badge"></span>
      <button class="ag-btn ag-btn-ghost" onclick="ag_logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </header>

  <!-- ---- PAINEL ADMIN ---- -->
  <div id="ag-view-admin" style="display:none">
    <div class="ag-wrap">

      <!-- Tabs -->
      <div class="ag-admin-tabs">
        <button class="ag-tab-btn active" onclick="ag_switchTab('tarefas', this)">
          <i class="fa-solid fa-list-check"></i> Tarefas
        </button>
        <button class="ag-tab-btn" onclick="ag_switchTab('por-operador', this)">
          <i class="fa-solid fa-users-viewfinder"></i> Visão por Operador
        </button>
        <button class="ag-tab-btn" onclick="ag_switchTab('ranking', this)">
          <i class="fa-solid fa-ranking-star"></i> Ranking & SLA
        </button>
        <button class="ag-tab-btn" onclick="ag_switchTab('historico', this)">
          <i class="fa-solid fa-clock-rotate-left"></i> Histórico
        </button>
      </div>

      <!-- TAB: Tarefas -->
      <div id="ag-tab-tarefas" class="ag-tab-pane active">
        <div id="ag-kpi-admin" class="ag-kpi-grid"></div>

        <div class="ag-actions-bar">
          <button class="ag-btn ag-btn-primary" onclick="ag_openTaskModal()">
            <i class="fa-solid fa-plus"></i> Nova Atividade
          </button>
          <div class="ag-filters">
            <select id="ag-filter-op" onchange="ag_renderAdminTable()">
              <option value="">Todos os Operadores</option>
              <option value="iris">Iris Souza</option>
              <option value="hallan">Hallan de Barros</option>
              <option value="victor">Victor Dourado</option>
              <option value="walmir">Walmir da Luz</option>
              <option value="rodrigo">Rodrigo Vilanova</option>
              <option value="nikolas">Nikolas Cardoso</option>
            </select>
            <select id="ag-filter-status" onchange="ag_renderAdminTable()">
              <option value="">Todos os Status</option>
              <option value="pendente">Pendente</option>
              <option value="atrasada">Atrasada</option>
              <option value="concluida">Concluída</option>
            </select>
          </div>
        </div>

        <div class="ag-table-wrap">
          <table class="ag-table">
            <thead>
              <tr>
                <th>Atividade</th>
                <th>Responsável</th>
                <th>Prazo</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="ag-admin-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- TAB: Visão por Operador -->
      <div id="ag-tab-por-operador" class="ag-tab-pane">
        <div id="ag-grouped-view-body" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;"></div>
      </div>

      <!-- TAB: Ranking -->
      <div id="ag-tab-ranking" class="ag-tab-pane">
        <div class="ag-actions-bar" style="margin-bottom:1rem">
          <button class="ag-btn ag-btn-primary" id="btn-print-report" onclick="ag_openPrintReport()">
            <i class="fa-solid fa-print"></i> Relatório por Responsável
          </button>
        </div>
        <div class="ag-table-wrap" style="padding: 2rem;" id="ag-ranking-body"></div>
      </div>

      <!-- TAB: Histórico -->
      <div id="ag-tab-historico" class="ag-tab-pane">
        <div class="ag-table-wrap">
          <table class="ag-table">
            <thead>
              <tr>
                <th>Atividade</th>
                <th>Operador</th>
                <th>Concluída Em</th>
                <th>Por</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody id="ag-history-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- ---- PAINEL OPERADOR ---- -->
  <div id="ag-view-operador" style="display:none">
    <div class="ag-wrap">
      <div id="ag-kpi-op" class="ag-kpi-grid"></div>
      <div id="ag-op-tasks"></div>
    </div>
  </div>

</div>

<!-- ============================================================
     MODAL: CRIAR / EDITAR TAREFA
     ============================================================ -->
<div id="ag-modal-task" class="ag-modal-overlay" style="display:none" onclick="if(event.target===this) ag_closeTaskModal()">
  <div class="ag-modal">
    <div class="ag-modal-header">
      <h3 id="ag-modal-task-title"><i class="fa-solid fa-plus"></i> Nova Atividade</h3>
      <button class="ag-modal-close" onclick="ag_closeTaskModal()">&#215;</button>
    </div>
    <div class="ag-modal-body">
      <input type="hidden" id="ag-task-id">
      <div class="ag-form-group">
        <label>Título da Atividade *</label>
        <input type="text" id="ag-task-name" placeholder="Ex: Conferência de postos">
      </div>
      <div class="ag-form-row">
        <div class="ag-form-group">
          <label>Responsável *</label>
          <select id="ag-task-op">
            <option value="">— Selecione —</option>
            <option value="iris">Iris Souza</option>
            <option value="hallan">Hallan de Barros</option>
            <option value="victor">Victor Dourado</option>
            <option value="walmir">Walmir da Luz</option>
            <option value="rodrigo">Rodrigo Vilanova</option>
            <option value="nikolas">Nikolas Cardoso</option>
          </select>
        </div>
        <div class="ag-form-group">
          <label>Frequência (Recorrência)</label>
          <select id="ag-task-freq">
            <option value="once">Apenas uma vez</option>
            <option value="diaria">Diária (Todo dia)</option>
            <option value="semanal">Semanal</option>
            <option value="mensal">Mensal</option>
          </select>
        </div>
      </div>
      <div class="ag-form-row">
        <div class="ag-form-group">
          <label>Data/Hora Limite *</label>
          <input type="datetime-local" id="ag-task-deadline">
        </div>
        <div class="ag-form-group">
          <label>Prioridade</label>
          <select id="ag-task-priority">
            <option value="baixa">🟢 Baixa</option>
            <option value="media" selected>🟡 Média</option>
            <option value="alta">🔴 Alta</option>
          </select>
        </div>
      </div>
      <div class="ag-form-group">
        <label>Descrição (opcional)</label>
        <textarea id="ag-task-desc" rows="2" placeholder="Detalhes adicionais..."></textarea>
      </div>
    </div>
    <div class="ag-modal-footer">
      <button class="ag-btn ag-btn-ghost" onclick="ag_closeTaskModal()">Cancelar</button>
      <button class="ag-btn ag-btn-primary" onclick="ag_saveTask()">
        <i class="fa-solid fa-floppy-disk"></i> Salvar Atividade
      </button>
    </div>
  </div>
</div>

<!-- ============================================================
     MODAL: CONCLUIR
     ============================================================ -->
<div id="ag-modal-conclude" class="ag-modal-overlay" style="display:none" onclick="if(event.target===this) ag_closeConcludeModal()">
  <div class="ag-modal">
    <div class="ag-modal-header">
      <h3><i class="fa-solid fa-circle-check"></i> Concluir Atividade</h3>
      <button class="ag-modal-close" onclick="ag_closeConcludeModal()">&#215;</button>
    </div>
    <div class="ag-modal-body">
      <input type="hidden" id="ag-conclude-id">
      <p id="ag-conclude-name" style="font-weight: 600; margin: 0 0 1rem;"></p>
      <div class="ag-form-group">
        <label>Observação / Justificativa</label>
        <textarea id="ag-conclude-obs" rows="3" placeholder="Opcional..."></textarea>
      </div>
    </div>
    <div class="ag-modal-footer">
      <button class="ag-btn ag-btn-ghost" onclick="ag_closeConcludeModal()">Cancelar</button>
      <button class="ag-btn ag-btn-success" onclick="ag_confirmConclusion()">
        <i class="fa-solid fa-check"></i> Confirmar Conclusão
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="ag-toast" class="ag-toast"></div>

<!-- ============================================================
     MODAL: RELATÓRIO POR RESPONSÁVEL (Impressão)
     ============================================================ -->
<div id="ag-modal-print" class="ag-modal-overlay" style="display:none" onclick="if(event.target===this) ag_closePrintReport()">
  <div class="ag-print-modal">
    <div class="ag-print-modal-header">
      <div class="ag-print-modal-title">
        <i class="fa-solid fa-print"></i>
        <div>
          <h3 id="ag-print-report-title">Relatório por Responsável</h3>
          <p id="ag-print-report-period" style="margin:0;font-size:.85rem;color:#64748b"></p>
        </div>
      </div>
      <div style="display:flex;gap:.7rem;align-items:center">
        <button class="ag-btn ag-btn-primary" onclick="ag_printReport()">
          <i class="fa-solid fa-print"></i> Imprimir / Salvar PDF
        </button>
        <button class="ag-modal-close" onclick="ag_closePrintReport()">&#215;</button>
      </div>
    </div>
    <div class="ag-print-modal-body" id="ag-print-report-body"></div>
  </div>
</div>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- EmailJS -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="js/email-service.js?v=1.0"></script>
<!-- App -->
<script src="js/firebase-config.js?v=2.0"></script>
<script src="js/agenda.js?v=2.0"></script>
</body>
</html>
